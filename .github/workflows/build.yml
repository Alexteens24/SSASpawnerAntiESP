name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - paperTarget: 1.21.11
            java: 21
          - paperTarget: 26.1.2
            java: 25

    name: Paper ${{ matrix.paperTarget }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: gradle

      - name: Build JAR
        run: ./gradlew jar -PpaperTarget=${{ matrix.paperTarget }} --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: SSASpawnerAntiESP-${{ matrix.paperTarget }}
          path: build/libs/SSASpawnerAntiESP-*.jar
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all JARs
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.jar
          generate_release_notes: true
